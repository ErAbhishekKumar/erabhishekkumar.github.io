    <style>
      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        margin: 0;
        padding: 20px;
        background: #eef2f7;
        color: #333;
      }

      .screen {
        display: none;
      }

      .active {
        display: block;
      }

      /* Main Menu */
      .menu-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        margin-top: 30px;
      }

      .btn-main {
        padding: 20px;
        font-size: 18px;
        cursor: pointer;
        background: #007bff;
        color: white;
        border: none;
        border-radius: 12px;
        transition: 0.3s;
        box-shadow: 0 4px 15px rgba(0, 123, 255, 0.3);
      }

      .btn-main:hover {
        background: #0056b3;
        transform: translateY(-2px);
      }

      /* Table Layout */
      .table-wrapper {
        background: white;
        padding: 15px;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        overflow-x: auto;
      }

      table {
        border-collapse: separate;
        border-spacing: 5px;
        margin-bottom: 20px;
      }

      /* Controls Row */
      .control-cell {
        background: #f8f9fa;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #dee2e6;
      }

      .btn-action {
        display: block;
        width: 100%;
        margin: 2px 0;
        padding: 5px;
        font-size: 12px;
        cursor: pointer;
        border: none;
        border-radius: 4px;
        color: white;
        font-weight: bold;
      }

      .btn-fill {
        background: #28a745;
      }

      .btn-clear {
        background: #dc3545;
      }

      /* Cells and Inputs */
      td {
        min-width: 100px;
        text-align: center;
        font-size: 14px;
      }

      input {
        width: 60px;
        padding: 8px;
        text-align: center;
        border: 2px solid #ddd;
        border-radius: 6px;
        font-size: 16px;
        outline: none;
        transition: 0.2s;
      }

      input:focus {
        border-color: #007bff;
        background: #f0f7ff;
      }

      .error {
        background-color: #ffdce0 !important;
        border-color: #ff4d4d !important;
      }

      /* Header and Home */
      .header-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }

      .home-btn {
        background: #343a40;
        color: white;
        padding: 10px 20px;
        border-radius: 8px;
        text-decoration: none;
        border: none;
        cursor: pointer;
      }

      .check-btn {
        display: block;
        width: 200px;
        margin: 20px auto;
        padding: 15px;
        background: #6f42c1;
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
      }

      /* Grid Layout for Squares & Roots */
      .practice-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
        gap: 15px;
        margin-top: 20px;
        margin-bottom: 20px;
      }

      .practice-card {
        background: white;
        padding: 15px 10px;
        border-radius: 12px;
        text-align: center;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        border: 1px solid #e9ecef;
      }

      .practice-card input {
        width: 70px;
        margin-top: 8px;
        font-weight: bold;
      }

      .practice-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
        transition: 0.3s;
      }

      /* Adaptive Math Practice CSS */
      .vertical-menu {
        display: flex;
        flex-direction: column;
        gap: 15px;
        max-width: 300px;
        margin: 0 auto;
      }

      .op-btn {
        padding: 15px;
        font-size: 20px;
        border-radius: 10px;
        border: none;
        background: #17a2b8;
        color: white;
        cursor: pointer;
        transition: 0.2s;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }

      .op-btn:hover {
        background: #138496;
        transform: scale(1.02);
      }

      .math-arena {
        text-align: center;
        margin-top: 20px;
      }

      .question-box {
        font-size: 32px;
        font-weight: bold;
        margin: 20px auto;
        padding: 20px;
        background: white;
        border-radius: 15px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        max-width: 350px;
      }

      .numpad {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        max-width: 280px;
        margin: 20px auto;
      }

      .num-btn {
        padding: 15px;
        font-size: 22px;
        border-radius: 10px;
        border: 1px solid #dee2e6;
        background: #f8f9fa;
        cursor: pointer;
        transition: 0.1s;
      }

      .num-btn:active {
        background: #e2e6ea;
        transform: translateY(2px);
      }

      .action-btn {
        background: #ffc107;
        font-weight: bold;
        border-color: #e0a800;
      }

      .submit-btn {
        background: #28a745;
        color: white;
        grid-column: span 3;
        font-weight: bold;
        border-color: #218838;
      }

      #math-answer {
        font-size: 28px;
        padding: 10px;
        width: 120px;
        text-align: center;
        border: 2px solid #007bff;
        border-radius: 8px;
        pointer-events: none;
        background: #f0f7ff;
        color: #007bff;
        font-weight: bold;
        margin-top: 10px;
      }

      .level-badge {
        font-size: 16px;
        background: #6f42c1;
        color: white;
        padding: 8px 15px;
        border-radius: 20px;
        margin-bottom: 10px;
        display: inline-block;
        font-weight: bold;
      }

      #feedback-msg {
        height: 25px;
        font-size: 16px;
        font-weight: bold;
        transition: 0.3s;
      }
    </style>
  </head>

<body>

  <div id="main-menu" class="screen active">
    <h1>Abhishek Practice Portal</h1>
    <div class="menu-grid">
      <button class="btn-main" onclick="showScreen('table-module')">1 to 40 Table</button>
      <button class="btn-main" onclick="showScreen('square-module')">Squares (2 to 100)</button>
      <button class="btn-main" onclick="showScreen('root-module')">Square Roots</button>
      <button class="btn-main" onclick="showScreen('adaptive-module')">Adaptive Math Practice</button>
      <button class="btn-main" style="background:#fd7e14;"
        onclick="showScreen('fraction-module'); startFraction();">Percentage & Fractions</button>
      <button class="btn-main" style="background:#20c997;"
        onclick="showScreen('missing-num-module'); startMissingNum();">Missing Number (Algebra)</button>
      <button class="btn-main" style="background:#e83e8e;" onclick="showReport(); showScreen('report-module');">📊
        Daily Performance Report</button>
    </div>
  </div>

  <div id="table-module" class="screen">
    <div class="header-bar">
      <h2>Multiplication Tables (1-40)</h2>
      <button class="home-btn" onclick="showScreen('main-menu')">Home Menu</button>
    </div>

    <div class="table-wrapper">
      <table id="math-table">
        <thead id="table-header">
        </thead>
        <tbody id="table-body">
        </tbody>
      </table>
    </div>

    <button class="check-btn" onclick="checkTable()">Check All Answers</button>
  </div>

  <div id="square-module" class="screen">
    <div class="header-bar">
      <h2>Squares Practice (2-100)</h2>
      <button class="home-btn" onclick="showScreen('main-menu')">Home Menu</button>
    </div>
    <div id="square-container" class="practice-grid"></div>
    <button class="check-btn" onclick="checkAnswers('square-input')">Check All Squares</button>
  </div>

  <div id="root-module" class="screen">
    <div class="header-bar">
      <h2>Square Roots Practice</h2>
      <button class="home-btn" onclick="showScreen('main-menu')">Home Menu</button>
    </div>
    <div id="root-container" class="practice-grid"></div>
    <button class="check-btn" onclick="checkAnswers('root-input')">Check All Roots</button>
  </div>

  <div id="adaptive-module" class="screen">
    <div class="header-bar">
      <h2>Adaptive Math Practice</h2>
      <button class="home-btn" onclick="stopAdaptive(); showScreen('main-menu')">Home Menu</button>
    </div>

    <div id="operator-selection" class="vertical-menu">
      <button class="op-btn" onclick="startAdaptive('addition', '+')">➕ Addition (जोड़)</button>
      <button class="op-btn" onclick="startAdaptive('subtraction', '−')">➖ Subtraction (घटाव)</button>
      <button class="op-btn" onclick="startAdaptive('multiplication', '×')">✖️ Multiplication (गुणा)</button>
      <button class="op-btn" onclick="startAdaptive('division', '÷')">➗ Division (भाग)</button>
    </div>

    <div id="practice-arena" class="math-arena" style="display: none;">
      <div class="level-badge" id="level-display">Level: 1</div>
      <div class="level-badge" style="background:#ffc107; color:#333;" id="streak-display">Streak: 0</div>
      <div id="timer-display" style="font-weight:bold; color:#dc3545; margin-bottom:10px;"></div>

      <div id="feedback-msg"></div>

      <div class="question-box">
        <span id="math-q-text"></span><br>
        <input type="text" id="math-answer" placeholder="?" readonly>
      </div>

      <div class="numpad">
        <button class="num-btn" onclick="typeNum('1')">1</button>
        <button class="num-btn" onclick="typeNum('2')">2</button>
        <button class="num-btn" onclick="typeNum('3')">3</button>
        <button class="num-btn" onclick="typeNum('4')">4</button>
        <button class="num-btn" onclick="typeNum('5')">5</button>
        <button class="num-btn" onclick="typeNum('6')">6</button>
        <button class="num-btn" onclick="typeNum('7')">7</button>
        <button class="num-btn" onclick="typeNum('8')">8</button>
        <button class="num-btn" onclick="typeNum('9')">9</button>
        <button class="num-btn action-btn" onclick="typeNum('clear')">AC</button>
        <button class="num-btn" onclick="typeNum('0')">0</button>
        <button class="num-btn action-btn" onclick="typeNum('back')">⌫</button>
        <button class="num-btn submit-btn" onclick="checkAdaptiveAnswer()">Submit Answer</button>
      </div>
      <button class="home-btn" style="margin-top:20px; background:#6c757d;" onclick="backToOpSelection()">Change
        Operator</button>
    </div>

  </div>

  <div id="fraction-module" class="screen">
    <div class="header-bar">
      <h2>Percentage & Fractions</h2>
      <button class="home-btn" onclick="showScreen('main-menu')">Home</button>
    </div>
    <div class="math-arena">
      <div id="fraction-q" class="question-box"></div>
      <input type="text" id="fraction-answer" placeholder="?" readonly>
      <div class="numpad" id="fraction-numpad"></div>
    </div>
  </div>



  <div id="missing-num-module" class="screen">
    <div class="header-bar">
      <h2>Missing Number</h2>
      <button class="home-btn" onclick="showScreen('main-menu')">Home</button>
    </div>
    <div class="math-arena">
      <div id="missing-q" class="question-box"></div>
      <input type="text" id="missing-answer" placeholder="?" readonly>
    </div>
  </div>

  <div id="fraction-feedback" style="height: 25px; font-weight: bold; margin-bottom: 10px;"></div>

  <div id="missing-feedback" style="height: 25px; font-weight: bold; margin-bottom: 10px;"></div>

  <div id="report-module" class="screen">
    <div class="header-bar">
      <h2>Today's Performance Report</h2>
      <button class="home-btn" onclick="showScreen('main-menu')">Home</button>
    </div>
    <div class="table-wrapper">
      <table style="width:100%; border-collapse: collapse; background: white; border-radius: 10px;">
        <thead>
          <tr style="background: #6f42c1; color: white;">
            <th style="padding: 10px;">Module</th>
            <th>Solved</th>
            <th>Correct</th>
            <th>Accuracy</th>
          </tr>
        </thead>
        <tbody id="report-body"></tbody>
      </table>
      <button class="check-btn" style="background:#dc3545;" onclick="clearTodayStats()">Reset Today's
        Data</button>
    </div>
  </div>

  <script>
    const totalRows = 10;
    const totalCols = 40;

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      window.scrollTo(0, 0);
    }

    // Initialize Table
    function initTable() {
      const headerRow = document.getElementById('table-header');
      const tableBody = document.getElementById('table-body');

      // 1. Create Control Header
      let controlsHtml = '<tr>';
      for (let j = 1; j <= totalCols; j++) {
        controlsHtml += `
                <td class="control-cell">
                    <strong>Table ${j}</strong>
                    <button class="btn-action btn-fill" onclick="fillCol(${j})">Fill</button>
                    <button class="btn-action btn-clear" onclick="clearCol(${j})">Clear</button>
                </td>`;
      }
      controlsHtml += '</tr>';
      headerRow.innerHTML = controlsHtml;

      // 2. Create Input Rows
      let bodyHtml = '';
      for (let i = 1; i <= totalRows; i++) {
        bodyHtml += '<tr>';
        for (let j = 1; j <= totalCols; j++) {
          let tabIndex = ((j - 1) * totalRows) + i;
          bodyHtml += `
                    <td>
                        ${j} × ${i} = <br>
                        <input type="number" 
                               id="cell-${j}-${i}" 
                               tabindex="${tabIndex}" 
                               data-ans="${j * i}" 
                               class="table-input">
                    </td>`;
        }
        bodyHtml += '</tr>';
      }
      tableBody.innerHTML = bodyHtml;
    }

    // Fill specific column
    function fillCol(colNum) {
      for (let i = 1; i <= totalRows; i++) {
        const input = document.getElementById(`cell-${colNum}-${i}`);
        input.value = input.getAttribute('data-ans');
        input.classList.remove('error');
      }
    }

    // Clear specific column
    function clearCol(colNum) {
      for (let i = 1; i <= totalRows; i++) {
        const input = document.getElementById(`cell-${colNum}-${i}`);
        input.value = '';
        input.classList.remove('error');
      }
    }

    // Check all answers
    // --- 1. Tables ke liye Stats ---
    function checkTable() {
      const inputs = document.querySelectorAll('.table-input');
      let correctCount = 0;
      let totalAttempted = 0;

      inputs.forEach(input => {
        if (input.value === "") return;
        totalAttempted++;
        const userVal = parseInt(input.value);
        const correctVal = parseInt(input.getAttribute('data-ans'));

        if (userVal !== correctVal) {
          input.classList.add('error');
          updateStats('Multiplication Tables', false); // Ek galat answer
        } else {
          input.classList.remove('error');
          correctCount++;
          updateStats('Multiplication Tables', true); // Ek sahi answer
        }
      });
    }

    // --- 2. Squares aur Roots ke liye Stats ---
    function checkAnswers(className) {
      const inputs = document.querySelectorAll('.' + className);
      const moduleName = className === 'square-input' ? 'Squares' : 'Square Roots';

      inputs.forEach(input => {
        if (input.value === "") return;
        const userVal = parseInt(input.value);
        const correctVal = parseInt(input.getAttribute('data-ans'));

        if (userVal !== correctVal) {
          input.classList.add('error');
          updateStats(moduleName, false);
        } else {
          input.classList.remove('error');
          updateStats(moduleName, true);
        }
      });
    }

    // --- 3. Percentage & Fractions Feedback Update ---
    function processFractionAnswer() {
      const userInput = document.getElementById('fraction-answer').value;
      if (userInput === "") return;

      const isCorrect = parseInt(userInput) === fractionCorrectAns;
      const feedbackEl = document.getElementById('fraction-feedback');

      updateStats('Fractions & Perc', isCorrect);

      if (isCorrect) {
        feedbackEl.innerText = "✅ Correct! Well done.";
        feedbackEl.style.color = "#28a745";
      } else {
        feedbackEl.innerText = `❌ Wrong! Correct was ${fractionCorrectAns}`;
        feedbackEl.style.color = "#dc3545";
      }

      setTimeout(() => {
        feedbackEl.innerText = "";
        startFraction();
      }, 1500);
    }

    // --- 4. Missing Number Feedback Update ---
    function processMissingAnswer() {
      const userInput = document.getElementById('missing-answer').value;
      if (userInput === "") return;

      const isCorrect = parseInt(userInput) === missingCorrectAns;
      const feedbackEl = document.getElementById('missing-feedback');

      updateStats('Missing Number', isCorrect);

      if (isCorrect) {
        feedbackEl.innerText = "🔥 Correct Answer!";
        feedbackEl.style.color = "#28a745";
      } else {
        feedbackEl.innerText = `❌ Oops! It was ${missingCorrectAns}`;
        feedbackEl.style.color = "#dc3545";
      }

      setTimeout(() => {
        feedbackEl.innerText = "";
        startMissingNum();
      }, 1500);
    }

    // Run on load
    // Initialize Squares (2 to 100)
    function initSquares() {
      let html = '';
      for (let i = 2; i <= 100; i++) {
        html += `
                <div class="practice-card">
                    ${i}² = <br>
                    <input type="number" class="square-input" data-ans="${i * i}">
                </div>`;
      }
      document.getElementById('square-container').innerHTML = html;
    }

    // Initialize Roots (Perfect squares from 4 to 10000)
    function initRoots() {
      let html = '';
      for (let i = 2; i <= 100; i++) {
        let perfectSquare = i * i;
        html += `
                <div class="practice-card">
                    √${perfectSquare} = <br>
                    <input type="number" class="root-input" data-ans="${i}">
                </div>`;
      }
      document.getElementById('root-container').innerHTML = html;
    }

    // Generic check function for both Squares and Roots
    function checkAnswers(className) {
      const inputs = document.querySelectorAll('.' + className);
      inputs.forEach(input => {
        if (input.value === "") return;

        const userVal = parseInt(input.value);
        const correctVal = parseInt(input.getAttribute('data-ans'));

        if (userVal !== correctVal) {
          input.classList.add('error');
        } else {
          input.classList.remove('error');
        }
      });
    }

    // Run on load
    initTable();
    initSquares();
    initRoots();

    // === ADAPTIVE MATH ENGINE ===
    let currentOp = '';
    let currentSym = '';
    let userLevel = 1;
    let maxLevel = 10;
    let questionStartTime = 0;
    let correctAns = 0;

    // Difficulty settings for levels [min, max]
    const levelBounds = {
      1: [1, 10], 2: [10, 20], 3: [15, 30], 4: [20, 50], 5: [30, 80],
      6: [50, 100], 7: [80, 150], 8: [100, 300], 9: [200, 500], 10: [500, 1000]
    };

    function startAdaptive(op, sym) {
      currentOp = op;
      currentSym = sym;
      userLevel = 1; // Reset to level 1 for new operation
      document.getElementById('operator-selection').style.display = 'none';
      document.getElementById('practice-arena').style.display = 'block';
      document.getElementById('feedback-msg').innerText = '';
      generateAdaptiveQuestion();
    }

    function stopAdaptive() {
      backToOpSelection();
    }

    function backToOpSelection() {
      document.getElementById('operator-selection').style.display = 'flex';
      document.getElementById('practice-arena').style.display = 'none';
    }

    function getRandomForLevel(level) {
      let min = levelBounds[level][0];
      let max = levelBounds[level][1];
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    // function generateAdaptiveQuestion() {
    //     document.getElementById('level-display').innerText = `Level: ${userLevel} / ${maxLevel}`;
    //     document.getElementById('math-answer').value = '';

    //     let val1 = getRandomForLevel(userLevel);
    //     let val2 = getRandomForLevel(userLevel);

    //     if (currentOp === 'subtraction' && val1 < val2) {
    //         // Swap to ensure positive answers
    //         let temp = val1; val1 = val2; val2 = temp;
    //     }

    //     if (currentOp === 'division') {
    //         // Ensure clean division without fractions
    //         let answer = getRandomForLevel(Math.max(1, userLevel - 1)); 
    //         val1 = answer * val2; 
    //     }

    //     // Calculate correct answer internally
    //     switch (currentOp) {
    //         case 'addition': correctAns = val1 + val2; break;
    //         case 'subtraction': correctAns = val1 - val2; break;
    //         case 'multiplication': correctAns = val1 * val2; break;
    //         case 'division': correctAns = val1 / val2; break;
    //     }

    //     document.getElementById('math-q-text').innerText = `${val1} ${currentSym} ${val2} =`;
    //     questionStartTime = Date.now(); // Start timer
    // }

    let streak = 0;
    let autoSkipTimer;

    function generateAdaptiveQuestion() {
      // पुराने टाइमर को साफ़ करें
      clearTimeout(autoSkipTimer);

      document.getElementById('level-display').innerText = `Level: ${userLevel} / ${maxLevel}`;
      document.getElementById('streak-display').innerText = `Streak: ${streak}`;
      document.getElementById('math-answer').value = '';
      document.getElementById('timer-display').innerText = '';

      let val1 = getRandomForLevel(userLevel);
      let val2 = getRandomForLevel(userLevel);

      // Vedic Trick Chance (10% chance to get a special pattern)
      if (Math.random() > 0.9 && currentOp === 'multiplication') {
        const tricks = [5, 11, 25];
        val2 = tricks[Math.floor(Math.random() * tricks.length)];
      }

      if (currentOp === 'subtraction' && val1 < val2) [val1, val2] = [val2, val1];
      if (currentOp === 'division') {
        let answer = getRandomForLevel(Math.max(1, userLevel - 1));
        val1 = answer * val2;
      }

      switch (currentOp) {
        case 'addition': correctAns = val1 + val2; break;
        case 'subtraction': correctAns = val1 - val2; break;
        case 'multiplication': correctAns = val1 * val2; break;
        case 'division': correctAns = val1 / val2; break;
      }

      document.getElementById('math-q-text').innerText = `${val1} ${currentSym} ${val2} =`;
      questionStartTime = Date.now();

      // --- 50 SECOND AUTO-SKIP LOGIC ---
      autoSkipTimer = setTimeout(() => {
        const feedbackEl = document.getElementById('feedback-msg');
        feedbackEl.innerText = `⏳ Time's up! Answer was ${correctAns}. Next...`;
        feedbackEl.style.color = '#6c757d';
        streak = 0; // Streak टूट जाएगी पर लेवल कम नहीं होगा

        setTimeout(() => {
          feedbackEl.innerText = '';
          generateAdaptiveQuestion();
        }, 2500);
      }, 50000); // 50 Seconds
    }

    function checkAdaptiveAnswer() {
      clearTimeout(autoSkipTimer); // जवाब देते ही टाइमर बंद
      const userInput = document.getElementById('math-answer').value;
      if (userInput === '') return;

      const timeTaken = (Date.now() - questionStartTime) / 1000;
      const isCorrect = (parseInt(userInput) === correctAns);
      const feedbackEl = document.getElementById('feedback-msg');

      if (isCorrect) {
        streak++;
        if (timeTaken <= 5) {
          feedbackEl.innerText = `🔥 Lightning Fast! (${timeTaken.toFixed(1)}s)`;
          feedbackEl.style.color = '#28a745';
          if (userLevel < maxLevel) userLevel++;
        } else if (timeTaken <= 15) {
          feedbackEl.innerText = `✅ Good! (${timeTaken.toFixed(1)}s)`;
          feedbackEl.style.color = '#17a2b8';
        } else {
          feedbackEl.innerText = `🐢 Correct, but try to be faster!`;
          feedbackEl.style.color = '#fd7e14';
          // यहाँ लेवल कम नहीं होगा, बस फीडबैक मिलेगा
        }
      } else {
        feedbackEl.innerText = `❌ Wrong! Correct was ${correctAns}`;
        feedbackEl.style.color = '#dc3545';
        streak = 0;
        if (userLevel > 1) userLevel--; // गलत होने पर लेवल कम होगा
      }

      setTimeout(() => {
        feedbackEl.innerText = '';
        generateAdaptiveQuestion();
      }, 2000);
    }

    function typeNum(action) {
      const input = document.getElementById('math-answer');
      if (action === 'clear') {
        input.value = '';
      } else if (action === 'back') {
        input.value = input.value.slice(0, -1);
      } else {
        input.value += action;
      }
    }

    // === PERFORMANCE TRACKING LOGIC ===
    function getTodayDate() {
      return new Date().toISOString().split('T')[0];
    }

    function updateStats(moduleName, isCorrect) {
      const today = getTodayDate();
      let stats = JSON.parse(localStorage.getItem('mathStats')) || {};

      // Agar naya din hai, toh purana data clear karein
      if (stats.date !== today) {
        stats = { date: today, data: {} };
      }

      if (!stats.data[moduleName]) {
        stats.data[moduleName] = { attempted: 0, correct: 0 };
      }

      stats.data[moduleName].attempted++;
      if (isCorrect) stats.data[moduleName].correct++;

      localStorage.setItem('mathStats', JSON.stringify(stats));
    }

    function showReport() {
      const stats = JSON.parse(localStorage.getItem('mathStats')) || { data: {} };
      const tbody = document.getElementById('report-body');
      tbody.innerHTML = '';

      for (const [module, info] of Object.entries(stats.data || {})) {
        const accuracy = ((info.correct / info.attempted) * 100).toFixed(1);
        tbody.innerHTML += `
            <tr style="border-bottom: 1px solid #ddd; text-align: center;">
                <td style="padding: 10px; font-weight: bold;">${module}</td>
                <td>${info.attempted}</td>
                <td>${info.correct}</td>
                <td style="color: ${accuracy > 80 ? 'green' : 'red'}">${accuracy}%</td>
            </tr>`;
      }
    }

    function clearTodayStats() {
      localStorage.removeItem('mathStats');
      showReport();
    }

    // === MISSING NUMBER LOGIC ===
    let missingCorrectAns = 0;
    function startMissingNum() {
      const val1 = Math.floor(Math.random() * 20) + 2;
      const val2 = Math.floor(Math.random() * 10) + 2;
      const res = val1 * val2;
      missingCorrectAns = val2;
      document.getElementById('missing-q').innerText = `${val1} × ? = ${res}`;
      document.getElementById('missing-answer').value = '';
    }

    // === FRACTION & PERCENTAGE LOGIC ===
    let fractionCorrectAns = 0;
    function startFraction() {
      const types = ['perc', 'frac'];
      const type = types[Math.floor(Math.random() * types.length)];

      if (type === 'perc') {
        const commonPerc = [10, 20, 25, 50, 75];
        const p = commonPerc[Math.floor(Math.random() * commonPerc.length)];
        const num = Math.floor(Math.random() * 10) * 40 + 40;
        fractionCorrectAns = (p / 100) * num;
        document.getElementById('fraction-q').innerText = `${p}% of ${num} = ?`;
      } else {
        const num = Math.floor(Math.random() * 20) + 10;
        fractionCorrectAns = num * 2;
        document.getElementById('fraction-q').innerText = `1/2 of ? = ${num}`;
      }
      document.getElementById('fraction-answer').value = '';
    }

    // === KEYBOARD OVERRIDE FOR NEW MODULES ===
    // Purane keyboard listener mein ye condition update karein:
    document.addEventListener('keydown', function (event) {
      let activeModule = '';
      if (document.getElementById('adaptive-module').classList.contains('active')) activeModule = 'adaptive';
      if (document.getElementById('missing-num-module').classList.contains('active')) activeModule = 'missing';
      if (document.getElementById('fraction-module').classList.contains('active')) activeModule = 'fraction';

      if (!activeModule) return;

      const key = event.key;
      const targetInput = document.getElementById(`${activeModule === 'adaptive' ? 'math-answer' : activeModule + '-answer'}`);

      if (key >= '0' && key <= '9') {
        targetInput.value += key;
      }
      if (key === 'Backspace') {
        targetInput.value = targetInput.value.slice(0, -1);
      }
      if (key === 'Enter') {
        if (activeModule === 'adaptive') checkAdaptiveAnswer();
        if (activeModule === 'missing') processMissingAnswer();
        if (activeModule === 'fraction') processFractionAnswer();
      }
    });
  </script>

    function selectOperation(op, sym) {

    function parseRange(rangeStr) {
      const parts = rangeStr.split("-").map(v => v.trim());
      if (parts.length !== 2) return null;
      const [min, max] = parts.map(Number);
      if (isNaN(min) || isNaN(max)) return null;
      return { min, max, isFloat: parts.some(p => p.includes(".")) };
    }

    function getRandom(range) {
      return range.isFloat
        ? (Math.random() * (range.max - range.min) + range.min).toFixed(2)
        : Math.floor(Math.random() * (range.max - range.min + 1) + range.min);
    }

    function startPractice() {
      if (!savedRange1 || !savedRange2) {

        case 'subtraction': correct = val1 - val2; break;
        case 'division': correct = val1 / val2; break;
